# Proyect-UI Release Pipeline
#
# Creates a GitHub Release when a version tag (v*) is pushed.
# Attaches the Tauri desktop bundles and web build as release assets.

name: Release

on:
  push:
    tags:
      - "v*"

env:
  NODE_VERSION: "20"
  RUST_VERSION: "1.88"

jobs:
  # ── Build all platforms ────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle-args: --bundles deb,appimage
            artifact-name: proyect-ui-ubuntu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle-args: --bundles msi
            artifact-name: proyect-ui-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Rust toolchain ${{ env.RUST_VERSION }}
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            patchelf \
            libappindicator3-dev

      - name: Install npm dependencies
        run: npm ci

      - name: Build Next.js static export
        run: npm run build

      - name: Build Tauri desktop app
        run: npx tauri build ${{ matrix.bundle-args }}

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-web
          path: out/
          retention-days: 1

      - name: Upload desktop bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}-desktop
          path: src-tauri/target/release/bundle/
          retention-days: 1

  # ── Create GitHub Release ──────────────────────────────────────────
  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: proyect-ui-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -laR

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "## 🎨 Proyect-UI $VERSION" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 📦 Assets" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "- **Ubuntu (.deb / .AppImage):** Desktop installer for Linux" >> CHANGELOG.md
          echo "- **Windows (.msi):** Desktop installer for Windows" >> CHANGELOG.md
          echo "- **Web build:** Static HTML/JS/CSS export" >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Proyect-UI ${{ steps.notes.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          files: |
            **/*.deb
            **/*.AppImage
            **/*.msi
            **/*.zip
